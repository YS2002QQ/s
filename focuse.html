<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>热点股票</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; margin: 24px; }
    h1 { font-size: 22px; color: #333; border-bottom: 3px solid #e74c3c; padding-bottom: 8px; }
    .info { color: #666; font-size: 14px; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 480px; }
    th, td { border: 1px solid #e0e0e0; padding: 10px 14px; text-align: left; }
    th { background: #f8f8f8; color: #555; font-weight: bold; }
    .clickable-row { cursor: pointer; transition: background 0.15s; }
    .clickable-row:hover { background: #e8f4fd; }
    .clickable-row:active { background: #cce5ff; }
    .clickable-row td:first-child { color: #2a6496; font-weight: bold; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
              background: #27ae60; color: #fff; padding: 10px 24px; border-radius: 6px;
              font-size: 14px; z-index: 999; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .toast.error { background: #e74c3c; }
  </style>
</head>
<body>
  <h1>热点股票</h1>
  <p class="info">共 23 支股票 &nbsp;|&nbsp; 点击代码或名称发送到通达信</p>
  <div id="toast" class="toast"></div>
  <table>
    <thead>
      <tr><th>股票代码</th><th>股票名称</th></tr>
    </thead>
    <tbody>
    <tr onclick="onStockClick('600749')" class="clickable-row"><td>600749</td><td>西藏旅游</td></tr>
    <tr onclick="onStockClick('000506')" class="clickable-row"><td>000506</td><td>招金黄金</td></tr>
    <tr onclick="onStockClick('300408')" class="clickable-row"><td>300408</td><td>三环集团</td></tr>
    <tr onclick="onStockClick('002050')" class="clickable-row"><td>002050</td><td>三花智控</td></tr>
    <tr onclick="onStockClick('300276')" class="clickable-row"><td>300276</td><td>三丰智能</td></tr>
    <tr onclick="onStockClick('002536')" class="clickable-row"><td>002536</td><td>飞龙股份</td></tr>
    <tr onclick="onStockClick('002185')" class="clickable-row"><td>002185</td><td>华天科技</td></tr>
    <tr onclick="onStockClick('600584')" class="clickable-row"><td>600584</td><td>长电科技</td></tr>
    <tr onclick="onStockClick('600488')" class="clickable-row"><td>600488</td><td>津药药业</td></tr>
    <tr onclick="onStockClick('000021')" class="clickable-row"><td>000021</td><td>深科技</td></tr>
    <tr onclick="onStockClick('002364')" class="clickable-row"><td>002364</td><td>中恒电气</td></tr>
    <tr onclick="onStockClick('603538')" class="clickable-row"><td>603538</td><td>美诺华</td></tr>
    <tr onclick="onStockClick('002245')" class="clickable-row"><td>002245</td><td>蔚蓝锂芯</td></tr>
    <tr onclick="onStockClick('301669')" class="clickable-row"><td>301669</td><td>高特电子</td></tr>
    <tr onclick="onStockClick('603928')" class="clickable-row"><td>603928</td><td>兴业股份</td></tr>
    <tr onclick="onStockClick('603861')" class="clickable-row"><td>603861</td><td>白云电器</td></tr>
    <tr onclick="onStockClick('603118')" class="clickable-row"><td>603118</td><td>共进股份</td></tr>
    <tr onclick="onStockClick('600988')" class="clickable-row"><td>600988</td><td>赤峰黄金</td></tr>
    <tr onclick="onStockClick('600288')" class="clickable-row"><td>600288</td><td>大恒科技</td></tr>
    <tr onclick="onStockClick('002767')" class="clickable-row"><td>002767</td><td>先锋电子</td></tr>
    <tr onclick="onStockClick('001365')" class="clickable-row"><td>001365</td><td>天海电子</td></tr>
    <tr onclick="onStockClick('001317')" class="clickable-row"><td>001317</td><td>三羊马</td></tr>
    <tr onclick="onStockClick('000545')" class="clickable-row"><td>000545</td><td>金浦钛业</td></tr>
    </tbody>
  </table>

  <script>
    const ALL_STOCKS = [
    {code:"600749",name:"西藏旅游"},
    {code:"000506",name:"招金黄金"},
    {code:"300408",name:"三环集团"},
    {code:"002050",name:"三花智控"},
    {code:"300276",name:"三丰智能"},
    {code:"002536",name:"飞龙股份"},
    {code:"002185",name:"华天科技"},
    {code:"600584",name:"长电科技"},
    {code:"600488",name:"津药药业"},
    {code:"000021",name:"深科技"},
    {code:"002364",name:"中恒电气"},
    {code:"603538",name:"美诺华"},
    {code:"002245",name:"蔚蓝锂芯"},
    {code:"301669",name:"高特电子"},
    {code:"603928",name:"兴业股份"},
    {code:"603861",name:"白云电器"},
    {code:"603118",name:"共进股份"},
    {code:"600988",name:"赤峰黄金"},
    {code:"600288",name:"大恒科技"},
    {code:"002767",name:"先锋电子"},
    {code:"001365",name:"天海电子"},
    {code:"001317",name:"三羊马"},
    {code:"000545",name:"金浦钛业"}
  ];
    const SERVER = "http://127.0.0.1:18080";

    function showToast(msg, isError) {
      var el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast" + (isError ? " error" : "");
      el.style.display = "block";
      setTimeout(function() { el.style.display = "none"; }, 2500);
    }

    function onStockClick(code) {
      showToast("正在发送: " + code + " ...");
      fetch(SERVER + "/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: code, all_stocks: ALL_STOCKS })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          showToast("已发送板块(" + ALL_STOCKS.length + "支) 并定位到 " + code);
        } else {
          showToast("发送失败: " + data.error, true);
        }
      })
      .catch(function(e) {
        showToast("连接服务失败，请检查程序是否运行", true);
      });
    }
  </script>
</body>
</html>
